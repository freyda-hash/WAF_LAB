server {
 listen 80;
 server_name app1.training.bunkerground.com;
 return 301 https://$host$request_uri;
 location / {
 proxy_pass http://127.0.0.1:5001;
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 }
}
server {
    listen 443 ssl;
    server_name app1.training.bunkerground.com;

    ssl_certificate /etc/ssl/training/fullchain.pem;
    ssl_certificate_key /etc/ssl/training/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY>
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    server_tokens off;
    error_page 500 502 503 504 /50x.html;
    location / {
        allow 192.168.158.128;
        deny all;
 #       auth_basic "Acces protege";
#        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
       # proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header CustomHeader;
        proxy_intercept_errors on;
    }
}
server {
 listen 80;
 server_name app2.training.bunkerground.com;
 return 301 https://$host$request_uri;
 location / {
 proxy_pass http://127.0.0.1:5001;
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 }
}
server {
    listen 443 ssl;
    server_name app2.training.bunkerground.com;
    ssl_certificate /etc/ssl/training/fullchain.pem;
    ssl_certificate_key /etc/ssl/training/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY>
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    server_tokens off;
    limit_req zone=req_per_ip burst=5 nodelay;
    limit_req_status 429;
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsec/main.conf;
    location / {
        allow 192.168.158.128;
        deny all;
   #     auth_basic "Acces protege";
  #      auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        ##proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header CustomHeader;
    }
}